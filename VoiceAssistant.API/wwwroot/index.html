<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; color: #ccc; }
    #assistant-label { font-size: 0.95rem; color: #9acdff; margin-bottom: 6px; }
    #switch-hint { font-size: 0.82rem; color: #bbb; margin-bottom: 20px; }
    #status { font-size: 0.85rem; color: #888; margin-bottom: 40px; min-height: 20px; }
    #mic-btn {
      width: 100px; height: 100px; border-radius: 50%; border: none;
      background: #1db954; cursor: pointer; font-size: 2.4rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s; margin-bottom: 20px;
    }
    #mic-btn:active { transform: scale(0.95); }
    #mic-btn.recording { background: #e53935; animation: pulse 1s infinite; }
    #mic-btn:disabled { background: #333; cursor: not-allowed; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(229,57,53,0); }
    }
    #play-btn {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: #1565c0; cursor: pointer; font-size: 1.6rem;
      display: none; align-items: center; justify-content: center;
      margin-bottom: 30px; transition: background 0.2s;
    }
    #play-btn.visible { display: flex; }
    #play-btn:active { background: #0d47a1; }
    .card {
      width: 100%; max-width: 520px; background: #1a1a1a;
      border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; display: none;
    }
    .card.visible { display: block; }
    .card-label { font-size: 0.75rem; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-text { font-size: 1rem; line-height: 1.6; color: #eee; }
    #error-box { color: #e53935; font-size: 0.9rem; margin-top: 8px; min-height: 20px; }
    #hold-hint { font-size: 0.8rem; color: #555; margin-bottom: 30px; }

    #chat-input-area {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      width: 100%;
      max-width: 520px;
    }
    #textInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      font-size: 15px;
    }
    #textInput:focus { outline: none; border-color: #2563eb; }
    #sendBtn {
      padding: 10px 18px;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #sendBtn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <nav style="display:flex;gap:12px;margin-bottom:20px">
    <a href="/" style="font-size:0.85rem;color:#888;text-decoration:none;padding:6px 12px;border-radius:6px;background:#1a1a1a">🎤 Voice</a>
    <a href="/bill.html" style="font-size:0.85rem;color:#888;text-decoration:none;padding:6px 12px;border-radius:6px;background:#1a1a1a">🧾 Bills</a>
    <a href="/inventory.html" style="font-size:0.85rem;color:#888;text-decoration:none;padding:6px 12px;border-radius:6px;background:#1a1a1a">📦 Inventory</a>
    <a href="/settings.html" style="font-size:0.85rem;color:#888;text-decoration:none;padding:6px 12px;border-radius:6px;background:#1a1a1a">⚙️ Settings</a>
  </nav>

  <h1>Voice Assistant</h1>
  <div id="assistant-label">Nova</div>
  <div id="switch-hint">Say “switch to Stocky” or “switch to Nova” to change assistants.</div>
  <div id="status">Connecting...</div>
  <button id="mic-btn" disabled>🎤</button>


  <div id="hold-hint">Tap and hold to speak</div>
  <button id="play-btn" title="Play response">🔊</button>

  <div id="chat-input-area">
    <input type="text" id="textInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>
  
  <div class="card" id="question-card">
    <div class="card-label">You said</div>
    <div class="card-text" id="question-text"></div>
  </div>
  <div class="card" id="answer-card">
    <div class="card-label">Assistant</div>
    <div class="card-text" id="answer-text"></div>
  </div>
  <div id="error-box"></div>

  <script>
    const micBtn      = document.getElementById('mic-btn');
    const playBtn     = document.getElementById('play-btn');
    const statusEl    = document.getElementById('status');
    const assistantLabel = document.getElementById('assistant-label');
    const questionCard = document.getElementById('question-card');
    const questionText = document.getElementById('question-text');
    const answerCard  = document.getElementById('answer-card');
    const answerText  = document.getElementById('answer-text');
    const errorBox    = document.getElementById('error-box');
    const holdHint    = document.getElementById('hold-hint');

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let pendingAudioUrl = null;
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    const connection = new signalR.HubConnectionBuilder()
      .withUrl("/voicehub")
      .withAutomaticReconnect()
      .build();

    connection.on("OnStatus", msg => { statusEl.textContent = msg; });

    connection.on("OnModeChanged", mode => {
      assistantLabel.textContent = `${mode}`;
    });

    connection.on("OnTranscription", text => {
      questionText.textContent = text;
      questionCard.classList.add('visible');
      answerCard.classList.remove('visible');
      answerText.textContent = '';
      playBtn.classList.remove('visible');
      if (pendingAudioUrl) { URL.revokeObjectURL(pendingAudioUrl); pendingAudioUrl = null; }
    });

    connection.on("OnAnswer", text => {
      answerText.textContent = text;
      answerCard.classList.add('visible');
    });

    connection.on("OnAudio", base64Audio => {
      const binary = atob(base64Audio);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'audio/wav' });
      if (pendingAudioUrl) URL.revokeObjectURL(pendingAudioUrl);
      pendingAudioUrl = URL.createObjectURL(blob);
      const audio = new Audio(pendingAudioUrl);
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          statusEl.textContent = 'Playing response...';
          playBtn.classList.remove('visible');
          audio.onended = () => { statusEl.textContent = 'Ready.'; micBtn.disabled = false; };
        }).catch(() => {
          statusEl.textContent = 'Tap 🔊 to hear response.';
          playBtn.classList.add('visible');
          micBtn.disabled = false;
        });
      }
    });

    connection.on("OnError", msg => {
      errorBox.textContent = msg;
      statusEl.textContent = 'Ready.';
      micBtn.disabled = false;
      micBtn.classList.remove('recording');
      isRecording = false;
    });

    playBtn.addEventListener('click', () => {
      if (!pendingAudioUrl) return;
      const audio = new Audio(pendingAudioUrl);
      audio.play();
      statusEl.textContent = 'Playing response...';
      playBtn.classList.remove('visible');
      audio.onended = () => { statusEl.textContent = 'Ready.'; };
    });

    async function startConnection() {
      try {
        await connection.start();
        statusEl.textContent = 'Ready.';
        micBtn.disabled = false;
      } catch (e) {
        statusEl.textContent = 'Connection failed. Retrying...';
        setTimeout(startConnection, 3000);
      }
    }

    startConnection();

    async function startRecording() {
      if (isRecording) return;
      errorBox.textContent = '';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const arrayBuffer = await blob.arrayBuffer();
          const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
          micBtn.disabled = true;
          statusEl.textContent = 'Processing...';
          await connection.invoke("ProcessAudio", base64);
          micBtn.disabled = false;
        };
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        statusEl.textContent = isMobile ? 'Listening... tap to stop' : 'Listening...';
      } catch (e) {
        errorBox.textContent = 'Mic access denied. Allow mic permission and use HTTPS.';
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
      }
    }

    if (isMobile) {
      holdHint.textContent = 'Tap to speak · tap again to stop';
      micBtn.addEventListener('click', () => {
        if (isRecording) stopRecording();
        else startRecording();
      });
    } else {
      holdHint.textContent = 'Hold to speak · release to send';
      micBtn.addEventListener('pointerdown', startRecording);
      micBtn.addEventListener('pointerup', stopRecording);
      micBtn.addEventListener('pointerleave', stopRecording);
    }

    document.getElementById('sendBtn').onclick = () => sendText();

    document.getElementById('textInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendText();
    });

    async function sendText() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) return;
      const audioResponse = true;
      document.getElementById('textInput').value = '';
      errorBox.textContent = '';
      micBtn.disabled = true;
      await connection.invoke('ProcessText', text, audioResponse);
      micBtn.disabled = false;
    }
  </script>
</body>
</html>
